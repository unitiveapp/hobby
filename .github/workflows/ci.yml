name: CI

on:
  push:
    branches: [main, master, "claude/**", "feature/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  build-web:
    name: Web Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web export
        run: npx expo export --platform web
        env:
          # No Mapbox token — defaults to Leaflet/OpenStreetMap
          EXPO_PUBLIC_MAPBOX_TOKEN: ""
          # Skip the @rnmapbox/maps native config plugin for web builds
          EXPO_PLATFORM: web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7
