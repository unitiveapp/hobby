name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Expo web export
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_MAPBOX_TOKEN: ""
          EXPO_PLATFORM: web

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll (required for _expo/ asset paths)
        # GitHub Pages runs Jekyll by default, which silently drops any
        # directory whose name starts with '_' — including Expo's _expo/
        # folder that contains the JS bundle.  An empty .nojekyll file
        # at the site root disables Jekyll and serves all files as-is.
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: false
