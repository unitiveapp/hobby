name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions needed to deploy Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel queued ones if a newer push arrives
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure GitHub Pages base path
        uses: actions/configure-pages@v4

      - name: Build Expo web export
        run: npx expo export --platform web
        env:
          # No Mapbox token → app defaults to Leaflet / OpenStreetMap (free)
          EXPO_PUBLIC_MAPBOX_TOKEN: ""

      - name: Add SPA 404 fallback
        # GitHub Pages returns a 404 for unknown paths; this redirects back
        # to index.html so Expo Router can handle client-side navigation.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
